<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Fake WebToon</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
    }
    header {
      background: black;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      color: red;
    }
    .banner {
      background: #222;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: yellow;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 15px;
    }
    .card {
      background: #1a1a1a;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .card:hover {
      background: #333;
    }
    .thumb {
      background: #444;
      height: 120px;
      margin-bottom: 5px;
    }
    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .popup-box {
      background: white;
      color: black;
      padding: 20px;
      text-align: center;
    }
    button {
      margin-top: 10px;
    }
    .thumb {
  background: #444;
  height: 120px;
  margin-bottom: 5px;
  overflow: hidden; /* 넘치는 부분 숨김 */
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 카드 꽉 채우기 (일부 잘릴 수 있음) */
}
  </style>
</head>
<body>

<header>🔥 Fake Webtoon</header>

<div class="banner">
  ⚠️ 우회 접속 중... 광고 차단 시 이용 불가
</div>

<div class="grid">
  <div class="card" onclick="showPopup()">
    <div class="thumb"></div>
    유완이의 하루
  </div>

  <div class="card" onclick="showError()">
    <div class="thumb"></div>
    좋은 사랑이었다
  </div>

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon2.jpg">
    </div>
    이등병의 하루
  </div>

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon1.png"> <!-- 오타도 수정 추천 -->
    </div>
    야르한 인생
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <p>읽으려면 로그인 하세요.</p>
    <button onclick="closePopup()">닫기</button>
  </div>
</div>

<script>
  function showPopup() {
    document.getElementById("popup").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  function showError() {
    alert("읽으려먼 로그인 하세요.");
  }

  // 콘솔에 가짜 로그 (촬영용)
  console.log("ERROR 403: 접근 차단됨");
  console.log("Bypass attempt detected...");
</script>

</body>
</html>
