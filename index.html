<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Webtoon Demo</title>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      background: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: red;
      font-size: 20px;
      font-weight: bold;
    }

    /* 메뉴 */
    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: red;
    }

    /* 안내 배너 (중요) */
    .notice {
      background: #330000;
      color: #ffaaaa;
      text-align: center;
      padding: 8px;
      font-size: 13px;
    }

    .banner {
      background: #222;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: yellow;
    }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* 썸네일 */
    .thumb {
      width: 100%;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      border-radius: 8px;
      background: #444;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      margin-top: 6px;
      font-size: 14px;
    }

    /* 팝업 */
    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .popup-box {
      background: white;
      color: black;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      width: 260px;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🔥 Webtoon</div>
  <nav>
    <a href="#">홈</a>
    <a href="#">인기</a>
    <a href="#">완결</a>
    <a href="#">랭킹</a>
    <a href="#">로그인</a>
  </nav>
</header>

<div class="notice">
  ※ 이 페이지는 불법 사이트가 아닙니다. 안심 하시고 사용해 주세요 ~~
</div>

<div class="banner">
  ⚠️ 접속 지연 발생 중... 잠시 후 자동 연결됩니다
</div>

<div class="grid">

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon3.jpg">
    </div>
    <div class="title">유완이의 하루</div>
  </div>

  <div class="card" onclick="showError()">
    <div class="thumb">
      <img src="webtoon4.png">
    </div>
    <div class="title">좋은 사랑이었다</div>
  </div>

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon2.jpg">
    </div>
    <div class="title">이등병의 하루</div>
  </div>

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="wabtoon1.png">
    </div>
    <div class="title">야르한 인생</div>
  </div>

</div>

<!-- 로그인 유도 팝업 -->
<div class="popup" id="popup">
  <div class="popup-box">
    <p>이용하려면 로그인이 필요합니다</p>
    <button onclick="closePopup()">닫기</button>
  </div>
</div>

<!-- 광고 팝업 -->
<div class="popup" id="adPopup">
  <div class="popup-box">
    <p>📢 광고 시청 후 이용 가능합니다</p>
    <button onclick="closeAd()">닫기</button>
  </div>
</div>

<script>
  function showPopup() {
    document.getElementById("popup").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  function showError() {
    alert("로그인이 필요합니다.");
  }

  function showAd() {
    document.getElementById("adPopup").style.display = "flex";
  }

  function closeAd() {
    document.getElementById("adPopup").style.display = "none";
  }

  // 3초 후 광고 등장
  window.onload = function() {
    setTimeout(showAd, 3000);
  };

  console.log("DEMO MODE ACTIVE");
</script>

</body>
</html>
