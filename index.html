<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Fake WebToon</title>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      background: black;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      color: red;
    }

    .banner {
      background: #222;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: yellow;
    }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 15px;
    }

    /* 카드 */
    .card {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* 썸네일 */
    .thumb {
      width: 100%;
      aspect-ratio: 2 / 3;   /* 웹툰 비율 */
      overflow: hidden;
      border-radius: 8px;
      background: #444;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;     /* 핵심 */
    }

    /* 제목 */
    .title {
      margin-top: 6px;
      font-size: 14px;
    }

    /* 팝업 */
    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-box {
      background: white;
      color: black;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      width: 250px;
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🔥 Fake Webtoon</header>

<div class="banner">
  ⚠️ 우회 접속 중... 광고 차단 시 이용 불가
</div>

<div class="grid">

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon3.jpg">
    </div>
    <div class="title">유완이의 하루</div>
  </div>

  <div class="card" onclick="showError()">
    <div class="thumb">
      <img src="webtoon4.png">
    </div>
    <div class="title">좋은 사랑이었다</div>
  </div>

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon2.jpg">
    </div>
    <div class="title">이등병의 하루</div>
  </div>

  <div class="card" onclick="showPopup()">
    <div class="thumb">
      <img src="webtoon1.png">
    </div>
    <div class="title">야르한 인생</div>
  </div>

</div>

<!-- 팝업 -->
<div class="popup" id="popup">
  <div class="popup-box">
    <p>읽으려면 로그인 하세요.</p>
    <button onclick="closePopup()">닫기</button>
  </div>
</div>

<script>
  function showPopup() {
    document.getElementById("popup").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  function showError() {
    alert("읽으려면 로그인 하세요.");
  }

  // 촬영용 콘솔 로그
  console.log("ERROR 403: 접근 차단됨");
  console.log("Bypass attempt detected...");
</script>

</body>
</html>
